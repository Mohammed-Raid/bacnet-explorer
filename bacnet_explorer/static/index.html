<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BACnet Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2128;
  --surface3:#21262d;
  --border:#30363d;
  --border2:#21262d;
  --text:#e6edf3;
  --text-muted:#7d8590;
  --text-dim:#484f58;
  --accent:#2f81f7;
  --accent-glow:rgba(47,129,247,.18);
  --accent-hover:#1f6feb;
  --green:#3fb950;
  --green-bg:rgba(63,185,80,.12);
  --red:#f85149;
  --red-bg:rgba(248,81,73,.12);
  --yellow:#d29922;
  --yellow-bg:rgba(210,153,34,.12);
  --purple:#bc8cff;
  --orange:#e3b341;
  --teal:#39d353;
  --radius:6px;
}

body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;line-height:1.5}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* ── Topbar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10}

.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#2f81f7,#bc8cff);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-weight:600;font-size:14px;letter-spacing:-.2px}
.logo-version{font-size:10px;color:var(--text-muted);background:var(--surface3);border:1px solid var(--border);padding:1px 6px;border-radius:10px;margin-left:4px}

.topbar-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}

.conn-indicator{display:flex;align-items:center;gap:6px;font-size:12px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s}
.conn-dot.online{background:var(--green);box-shadow:0 0 6px rgba(63,185,80,.5)}
.conn-dot.offline{background:var(--red)}

.ip-chip{background:var(--surface3);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-family:monospace;font-size:11px;color:var(--text-muted)}

.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:not(:disabled):hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:not(:disabled):hover{background:var(--surface2);border-color:var(--text-dim)}
.btn-ghost{background:transparent;color:var(--text-muted);padding:5px 10px}
.btn-ghost:not(:disabled):hover{color:var(--text);background:var(--surface3)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,81,73,.4)}
.btn-danger:not(:disabled):hover{background:var(--red-bg)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.btn-success:not(:disabled):hover{background:rgba(63,185,80,.2)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── Main layout ── */
.workspace{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}

.sidebar-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.device-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}

.tree-wrap{flex:1;overflow-y:auto;padding:4px 0}

/* ── Tree nodes ── */
.t-device{border-bottom:1px solid var(--border2)}
.t-dev-row{display:flex;align-items:center;gap:9px;padding:9px 14px 9px 10px;cursor:pointer;transition:background .1s;user-select:none}
.t-dev-row:hover{background:var(--surface2)}
.t-dev-row.active{background:var(--accent-glow)}

.t-chevron{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:9px;transition:transform .15s;flex-shrink:0}
.t-chevron.open{transform:rotate(90deg)}

.dev-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,rgba(47,129,247,.25),rgba(188,140,255,.25));border:1px solid rgba(47,129,247,.25);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}

.dev-meta{flex:1;min-width:0}
.dev-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-sub{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.t-objects{display:none;padding:2px 0 4px}
.t-objects.open{display:block}

.t-obj-row{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 38px;cursor:pointer;transition:background .1s}
.t-obj-row:hover{background:var(--surface2)}
.t-obj-row.active{background:rgba(47,129,247,.12)}
.t-obj-row.active .obj-label{color:var(--accent)}

.type-pill{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.4px;flex-shrink:0;text-transform:uppercase}
.obj-label{font-size:11px;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.t-loading{padding:7px 14px 7px 38px;display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:11px}

/* Type colors */
.tp-ai{background:rgba(47,129,247,.2);color:#79b8ff}
.tp-ao{background:rgba(227,179,65,.2);color:#e3b341}
.tp-av{background:rgba(188,140,255,.2);color:#bc8cff}
.tp-bi{background:rgba(63,185,80,.2);color:#56d364}
.tp-bo{background:rgba(248,81,73,.2);color:#ff7b72}
.tp-bv{background:rgba(57,211,83,.2);color:#39d353}
.tp-dev{background:rgba(247,129,47,.2);color:#f78166}
.tp-tl{background:rgba(57,187,218,.2);color:#39c5cf}
.tp-oth{background:rgba(125,133,144,.2);color:#7d8590}

/* ── Resize handle ── */
.resizer{width:4px;cursor:col-resize;background:transparent;flex-shrink:0;transition:background .2s}
.resizer:hover,.resizer.dragging{background:var(--accent)}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.content-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:48px}
.breadcrumb{display:flex;align-items:center;gap:6px;flex:1;min-width:0;font-size:12px}
.bc-sep{color:var(--text-dim)}
.bc-dim{color:var(--text-muted)}

.content-body{flex:1;overflow-y:auto;padding:20px}

/* ── Empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-muted);text-align:center}
.empty-glyph{font-size:52px;opacity:.2}
.empty-title{font-size:16px;font-weight:600;color:var(--text);opacity:.7}
.empty-hint{font-size:12px;line-height:1.6;max-width:280px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.card-head{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}

/* ── Property table ── */
.prop-table{width:100%;border-collapse:collapse}
.prop-table tr{border-bottom:1px solid var(--border2);transition:background .1s}
.prop-table tr:last-child{border-bottom:none}
.prop-table tr:hover{background:var(--surface2)}
.prop-table td{padding:8px 16px;vertical-align:middle}
.prop-name{width:42%;color:var(--text-muted);font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:11.5px}
.prop-val{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:11.5px;word-break:break-all}
.val-num{color:#79b8ff}
.val-str{color:#9ecbff}
.val-bool{color:#e3b341}
.val-null{color:var(--text-dim)}
.val-list{color:#56d364}

/* ── Write form ── */
.form-grid{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--text-muted);font-weight:500}
.fi{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:12px;outline:none;transition:border-color .15s;font-family:'Cascadia Code','Fira Code',monospace}
.fi:focus{border-color:var(--accent);background:var(--bg)}
.fi::placeholder{color:var(--text-dim)}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:120px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;font-family:monospace}
.stat-sub{font-size:10px;color:var(--text-muted);margin-top:2px}

/* ── Status bar ── */
.statusbar{background:var(--surface);border-top:1px solid var(--border);padding:4px 20px;font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:16px;flex-shrink:0;height:26px}
.sb-sep{color:var(--border)}
.sb-msg{color:var(--text)}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;display:inline-block}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:36px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--surface2);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;max-width:320px;animation:toastIn .2s ease}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.warn{border-left:3px solid var(--yellow)}
@keyframes toastIn{from{transform:translateX(24px);opacity:0}}
@keyframes toastOut{to{transform:translateX(24px);opacity:0}}

/* ── Discover progress ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.discovering{animation:pulse 1.2s ease infinite}

/* ── Tooltip ── */
[title]{cursor:help}

/* ── Selection highlight ── */
::selection{background:rgba(47,129,247,.3)}
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark">B</div>
    <span class="logo-text">BACnet Explorer</span>
    <span class="logo-version">v1.0</span>
  </div>

  <div class="topbar-divider"></div>

  <div class="conn-indicator">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText" style="color:var(--text-muted)">Connecting…</span>
  </div>

  <div class="ip-chip" id="ipChip">—</div>

  <div class="topbar-actions">
    <button class="btn btn-secondary btn-sm" onclick="discoverRange()" title="WhoIs with device ID range">⊞ Range</button>
    <button class="btn btn-secondary btn-sm" onclick="discoverDirect()" title="Unicast WhoIs to a specific IP:port (use this when server is on same machine)">⊟ Direct IP</button>
    <button class="btn btn-primary" id="discBtn" onclick="doDiscover()">
      <span id="discSpinner" style="display:none" class="spin"></span>
      <span id="discLabel">⊕ Discover</span>
    </button>
  </div>
</div>

<!-- ── Workspace ── -->
<div class="workspace">

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Devices</span>
      <span class="device-badge" id="devBadge">0</span>
    </div>
    <div class="tree-wrap" id="treeWrap">
      <div class="empty" style="padding:48px 0">
        <div class="empty-glyph">⊕</div>
        <div style="font-size:12px;color:var(--text-muted)">Click Discover to scan</div>
      </div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- ── Content ── -->
  <div class="content">
    <div class="content-bar" id="contentBar" style="display:none">
      <div class="breadcrumb" id="breadcrumb"></div>
      <button class="btn btn-ghost btn-sm" onclick="refreshView()" title="Refresh properties">↻ Refresh</button>
    </div>
    <div class="content-body" id="contentBody">
      <div class="empty">
        <div class="empty-glyph">⬡</div>
        <div class="empty-title">No object selected</div>
        <div class="empty-hint">Discover devices on your network, then click any object in the tree to inspect its properties.</div>
      </div>
    </div>
  </div>

</div>

<!-- ── Status bar ── -->
<div class="statusbar">
  <span id="sbConn">Ready</span>
  <span class="sb-sep">·</span>
  <span id="sbIp">—</span>
  <span class="sb-sep">·</span>
  <span id="sbDev">0 devices</span>
  <span class="sb-sep">·</span>
  <span class="sb-msg" id="sbMsg"></span>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const S = {
  devices: [],
  expanded: new Set(),
  objCache: {},          // deviceId → [{type, instance}] | 'loading'
  sel: null,             // {deviceId, type, instance}
  props: {},
};

// ─── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ─── Status polling ──────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const s = await api('GET', '/api/status');
    document.getElementById('connDot').className = 'conn-dot online';
    document.getElementById('connText').textContent = 'Connected';
    document.getElementById('ipChip').textContent = s.local_ip || '—';
    document.getElementById('sbIp').textContent = s.local_ip || '—';
    document.getElementById('sbDev').textContent = `${s.device_count} device${s.device_count !== 1 ? 's' : ''}`;
    document.getElementById('devBadge').textContent = s.device_count;
    document.getElementById('sbConn').textContent = 'Running';
  } catch {
    document.getElementById('connDot').className = 'conn-dot offline';
    document.getElementById('connText').textContent = 'Disconnected';
    document.getElementById('sbConn').textContent = 'Offline';
  }
}

// ─── Discover ───────────────────────────────────────────────────────────────
async function doDiscover(low, high, target) {
  const btn   = document.getElementById('discBtn');
  const spin  = document.getElementById('discSpinner');
  const label = document.getElementById('discLabel');

  btn.disabled = true;
  spin.style.display = 'inline-block';
  label.textContent  = ' Discovering…';
  setMsg(target ? `Sending unicast WhoIs → ${target}…` : 'Sending WhoIs broadcast…');

  try {
    const body = {};
    if (low    !== undefined) { body.low = low; body.high = high; }
    if (target !== undefined) { body.target = target; }
    const res = await api('POST', '/api/discover', body);
    if (res.error) { toast(res.error, 'err'); return; }

    S.devices = res.devices;
    renderTree();
    await pollStatus();

    if (res.devices.length === 0) {
      toast('No BACnet devices responded', 'err');
      setMsg('No devices found');
    } else {
      toast(`Found ${res.devices.length} device${res.devices.length > 1 ? 's' : ''}`, 'ok');
      setMsg(`Discovery complete — ${res.devices.length} device(s)`);
    }
  } catch (e) {
    toast('Discovery error: ' + e.message, 'err');
    setMsg('Discovery failed');
  } finally {
    btn.disabled = false;
    spin.style.display = 'none';
    label.textContent  = '⊕ Discover';
  }
}

function discoverRange() {
  const low  = prompt('Low device ID (e.g. 1):',    '1');
  if (!low)  return;
  const high = prompt('High device ID (e.g. 9999):', '9999');
  if (!high) return;
  doDiscover(parseInt(low), parseInt(high));
}

function discoverDirect() {
  const t = prompt(
    'Enter server IP:port\n(use this when the BACnet server is on the same machine)\n\nExample: 192.168.1.50:47808',
    location.hostname + ':47808'
  );
  if (!t) return;
  doDiscover(undefined, undefined, t.trim());
}

// ─── Tree ────────────────────────────────────────────────────────────────────
const TYPE_SHORT = {
  'analog-input':'AI','analog-output':'AO','analog-value':'AV',
  'binary-input':'BI','binary-output':'BO','binary-value':'BV',
  'device':'DEV','multi-state-input':'MSI','multi-state-output':'MSO',
  'multi-state-value':'MSV','trend-log':'TL','schedule':'SCH',
  'calendar':'CAL','notification-class':'NC','file':'FILE',
  'accumulator':'ACC','pulse-converter':'PC','event-enrollment':'EE',
};

function typeShort(t) { return TYPE_SHORT[t] || t.slice(0,4).toUpperCase(); }

function typePill(t) {
  if (t==='analog-input')  return 'tp-ai';
  if (t==='analog-output') return 'tp-ao';
  if (t==='analog-value')  return 'tp-av';
  if (t==='binary-input')  return 'tp-bi';
  if (t==='binary-output') return 'tp-bo';
  if (t==='binary-value')  return 'tp-bv';
  if (t==='device')        return 'tp-dev';
  if (t==='trend-log')     return 'tp-tl';
  return 'tp-oth';
}

function renderTree() {
  const wrap = document.getElementById('treeWrap');
  document.getElementById('devBadge').textContent = S.devices.length;

  if (!S.devices.length) {
    wrap.innerHTML = `<div class="empty" style="padding:48px 0">
      <div class="empty-glyph">⊕</div>
      <div style="font-size:12px;color:var(--text-muted)">No devices found</div>
    </div>`;
    return;
  }

  wrap.innerHTML = S.devices.map(d => `
    <div class="t-device" id="td-${d.id}">
      <div class="t-dev-row" id="tdr-${d.id}" onclick="toggleDev(${d.id})">
        <div class="t-chevron${S.expanded.has(d.id)?' open':''}" id="chv-${d.id}">▶</div>
        <div class="dev-icon">⬡</div>
        <div class="dev-meta">
          <div class="dev-name">${escHtml(d.name||`Device ${d.id}`)}</div>
          <div class="dev-sub">#${d.id} · ${escHtml(d.vendor||'—')} · ${escHtml(d.address)}</div>
        </div>
      </div>
      <div class="t-objects${S.expanded.has(d.id)?' open':''}" id="to-${d.id}">
        ${renderObjList(d.id)}
      </div>
    </div>
  `).join('');
}

function renderObjList(devId) {
  const cache = S.objCache[devId];
  if (cache === 'loading') return `<div class="t-loading"><div class="spin"></div>Loading objects…</div>`;
  if (!cache || !cache.length) return `<div class="t-loading" style="color:var(--text-dim)">No objects</div>`;
  return cache.map(o => {
    const active = S.sel && S.sel.deviceId===devId && S.sel.type===o.type && S.sel.instance===o.instance;
    return `<div class="t-obj-row${active?' active':''}"
                 id="tor-${devId}-${o.type}-${o.instance}"
                 onclick="selectObj(${devId},'${o.type}',${o.instance})">
      <span class="type-pill ${typePill(o.type)}">${typeShort(o.type)}</span>
      <span class="obj-label">${escHtml(o.type)},${o.instance}</span>
    </div>`;
  }).join('');
}

async function toggleDev(id) {
  const chv = document.getElementById(`chv-${id}`);
  const objs = document.getElementById(`to-${id}`);

  if (S.expanded.has(id)) {
    S.expanded.delete(id);
    chv.classList.remove('open');
    objs.classList.remove('open');
    return;
  }

  S.expanded.add(id);
  chv.classList.add('open');
  objs.classList.add('open');

  if (S.objCache[id]) return; // already loaded

  S.objCache[id] = 'loading';
  objs.innerHTML = `<div class="t-loading"><div class="spin"></div>Loading objects…</div>`;
  setMsg(`Loading object list for Device ${id}…`);

  try {
    const res = await api('GET', `/api/objects?device_id=${id}`);
    S.objCache[id] = res.error ? [] : res.objects;
    if (res.error) toast(res.error, 'err');
    else setMsg(`Device ${id}: ${res.objects.length} objects`);
  } catch(e) {
    S.objCache[id] = [];
    toast('Failed to load objects', 'err');
  }

  objs.innerHTML = renderObjList(id);
}

// ─── Select object & show properties ────────────────────────────────────────
async function selectObj(devId, type, instance) {
  S.sel = { deviceId: devId, type, instance };

  // Deactivate previous selections
  document.querySelectorAll('.t-obj-row').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.t-dev-row').forEach(el => el.classList.remove('active'));
  const row = document.getElementById(`tor-${devId}-${type}-${instance}`);
  const dr  = document.getElementById(`tdr-${devId}`);
  if (row) row.classList.add('active');
  if (dr)  dr.classList.add('active');

  await loadProps(devId, type, instance);
}

async function loadProps(devId, type, instance) {
  const bar  = document.getElementById('contentBar');
  const body = document.getElementById('contentBody');
  const bc   = document.getElementById('breadcrumb');
  const dev  = S.devices.find(d => d.id === devId);
  const devName = dev ? (dev.name || `Device ${devId}`) : `Device ${devId}`;

  bar.style.display = 'flex';
  bc.innerHTML = `
    <span class="bc-dim">${escHtml(devName)}</span>
    <span class="bc-sep">›</span>
    <span class="type-pill ${typePill(type)}" style="font-size:10px">${typeShort(type)}</span>
    <span style="margin-left:4px">${escHtml(type)},${instance}</span>
  `;

  body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:160px;gap:10px;color:var(--text-muted)">
    <div class="spin"></div>Reading properties…
  </div>`;
  setMsg(`Reading ${type},${instance} from Device ${devId}…`);

  try {
    const res = await api('GET', `/api/props?device_id=${devId}&type=${type}&instance=${instance}`);
    if (res.error) {
      toast(res.error, 'err');
      body.innerHTML = `<div class="empty"><div style="color:var(--red)">${escHtml(res.error)}</div></div>`;
      return;
    }
    S.props = res.props;
    renderProps(res.props, devId, type, instance);
    setMsg(`${Object.keys(res.props).length} properties loaded`);
  } catch(e) {
    toast('Failed: ' + e.message, 'err');
    body.innerHTML = `<div class="empty"><div>Connection error</div></div>`;
  }
}

function fmtVal(v) {
  if (v === null || v === undefined || v === 'None') return `<span class="val-null">null</span>`;
  const s = String(v);
  if (s === 'True' || s === 'False' || s === 'true' || s === 'false'
      || s === 'active' || s === 'inactive') return `<span class="val-bool">${escHtml(s)}</span>`;
  if (/^\[/.test(s)) return `<span class="val-list">${escHtml(s)}</span>`;
  if (!isNaN(parseFloat(s)) && s.trim() !== '' && !/[a-zA-Z]/.test(s.trim()))
    return `<span class="val-num">${escHtml(s)}</span>`;
  return `<span class="val-str">${escHtml(s)}</span>`;
}

function renderProps(props, devId, type, instance) {
  const entries = Object.entries(props);
  const presentValue = props['presentValue'] !== undefined ? String(props['presentValue']) : null;
  const units = props['units'] ? String(props['units']) : null;
  const objectName = props['objectName'] ? String(props['objectName']) : null;

  const rows = entries.map(([k, v]) => `
    <tr>
      <td class="prop-name">${escHtml(k)}</td>
      <td class="prop-val">${fmtVal(v)}</td>
    </tr>
  `).join('');

  const statsHtml = presentValue !== null ? `
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Present Value</div>
        <div class="stat-value" style="color:var(--accent)">${escHtml(presentValue)}</div>
        ${units ? `<div class="stat-sub">${escHtml(units)}</div>` : ''}
      </div>
      ${objectName ? `<div class="stat-card">
        <div class="stat-label">Object Name</div>
        <div class="stat-value" style="font-size:16px;color:var(--text)">${escHtml(objectName)}</div>
        <div class="stat-sub">${escHtml(type)},${instance}</div>
      </div>` : ''}
      <div class="stat-card">
        <div class="stat-label">Properties</div>
        <div class="stat-value" style="color:var(--green)">${entries.length}</div>
        <div class="stat-sub">loaded</div>
      </div>
    </div>
  ` : '';

  document.getElementById('contentBody').innerHTML = `
    ${statsHtml}
    <div class="card">
      <div class="card-head">
        <span class="card-label">Properties</span>
        <span style="font-size:11px;color:var(--text-dim)">${entries.length} entries</span>
      </div>
      <table class="prop-table"><tbody>${rows}</tbody></table>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-label">Write Property</span>
      </div>
      <div style="padding:16px">
        <div class="form-grid">
          <div class="fg">
            <label class="fl">Property</label>
            <input class="fi" id="wProp" value="presentValue" style="width:160px">
          </div>
          <div class="fg">
            <label class="fl">New Value</label>
            <input class="fi" id="wVal" placeholder="e.g. 22.5" style="width:150px">
          </div>
          <div class="fg">
            <label class="fl">Priority (1–16)</label>
            <input class="fi" id="wPrio" type="number" min="1" max="16" placeholder="optional" style="width:110px">
          </div>
          <div class="fg">
            <label class="fl">&nbsp;</label>
            <button class="btn btn-success" onclick="doWrite(${devId},'${type}',${instance})">
              ✎ Write
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function refreshView() {
  if (!S.sel) return;
  const { deviceId, type, instance } = S.sel;
  await loadProps(deviceId, type, instance);
}

// ─── Write ──────────────────────────────────────────────────────────────────
async function doWrite(devId, type, instance) {
  const prop  = document.getElementById('wProp').value.trim();
  const value = document.getElementById('wVal').value.trim();
  const prioS = document.getElementById('wPrio').value.trim();
  if (!prop || !value) { toast('Property and value are required', 'warn'); return; }
  const priority = prioS ? parseInt(prioS) : undefined;
  setMsg(`Writing ${prop} = ${value}…`);
  try {
    const body = { device_id: devId, type, instance, prop, value };
    if (priority) body.priority = priority;
    const res = await api('POST', '/api/write', body);
    if (res.ok) {
      toast(`Wrote ${prop} = ${value}`, 'ok');
      setMsg('Write successful');
      await loadProps(devId, type, instance);
    } else {
      toast(res.error || 'Write rejected', 'err');
      setMsg('Write failed');
    }
  } catch(e) {
    toast('Write error: ' + e.message, 'err');
  }
}

// ─── Resize ──────────────────────────────────────────────────────────────────
(function() {
  const sidebar  = document.getElementById('sidebar');
  const resizer  = document.getElementById('resizer');
  let   dragging = false;
  resizer.addEventListener('mousedown', e => {
    dragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor  = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(520, e.clientX));
    sidebar.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setMsg(t) { document.getElementById('sbMsg').textContent = t; }

function toast(msg, type='ok') {
  const w  = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type==='ok' ? '✓' : type==='err' ? '✗' : '⚠';
  el.innerHTML = `<span style="color:${type==='ok'?'var(--green)':type==='err'?'var(--red)':'var(--yellow)'}">${icon}</span><span>${escHtml(msg)}</span>`;
  w.appendChild(el);
  setTimeout(() => { el.style.animation='toastOut .2s ease forwards'; setTimeout(()=>el.remove(),200); }, 3500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
pollStatus();
setInterval(pollStatus, 5000);
</script>
</body>
</html>
