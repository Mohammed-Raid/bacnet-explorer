name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[app]" pyinstaller

      - name: Build exe
        run: pyinstaller bacnet_explorer.spec --clean -y

      - name: Zip release bundle
        run: Compress-Archive -Path "dist\BACnet Explorer" -DestinationPath "BACnet-Explorer-windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BACnet-Explorer-windows-x64.zip
          generate_release_notes: true
