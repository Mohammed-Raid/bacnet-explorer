name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  build-windows:
    name: Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bacpypes3 ifaddr colorama pywebview pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller bacnet_explorer.spec

      - name: Zip the bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\BACnet Explorer" `
                           -DestinationPath "BACnet-Explorer-windows-x64.zip"

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: BACnet-Explorer-windows-x64
          path: BACnet-Explorer-windows-x64.zip

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BACnet-Explorer-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
